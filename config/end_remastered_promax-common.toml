	damage_threshold = 10.0
	#攻击力高于阈值时的加成数值。默认：10.0
	#Range: 0.0 ~ 1.7976931348623157E308
	damage_above_bonus = 10.0
	#高于阈值时的加成是否为百分比（true=百分比，false=固定值）。默认：false
	damage_above_is_percent = false
	#攻击力低于或等于阈值时的固定数值。默认：10.0
	#Range: 0.0 ~ 1.7976931348623157E308
	damage_below_fixed = 10.0
	#低于阈值时的数值是否为百分比（true=百分比，false=固定值）。默认：false
	damage_below_is_percent = false

