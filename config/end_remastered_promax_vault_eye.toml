
[teleport]
	#是否启用传送功能。默认：true
	enabled = true
	#触发传送的方式：KEY_PRESS=按下绑定键，UNDEAD_PROCS=触发不死之眼效果时，BOTH=两者均可。默认：BOTH
	#Allowed Values: KEY_PRESS, UNDEAD_PROCS, BOTH
	trigger = "BOTH"
	#传送黑名单，这些维度不会被随机选中。格式："namespace:path"。仅在 use_whitelist = false 时生效。默认：空
	dimension_blacklist = []
	#传送白名单，仅这些维度会被选中。格式："namespace:path"。仅在 use_whitelist = true 时生效。默认：空
	dimension_whitelist = ["minecraft:overworld", "minecraft:the_nether", "minecraft:the_end", "true_end:beyond_the_dream", "timelessprison:timeless_dimension"]
	#是否使用白名单模式。false 表示使用黑名单模式。默认：false
	use_whitelist = true

[effects]
	#启用环境之眼效果
	environment = true
	#启用提升之眼效果
	enhance = true
	#启用怪异之眼效果
	weird = true
	#启用魔能之眼效果
	arcane = true
	#启用古迹之眼效果
	ancient = true
	#启用凋零之眼效果
	wither = true

