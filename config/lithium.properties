# Disabled: conflicts with MCA custom villager AI tasks (WanderOrTeleportToTargetTask crash)
mixin.ai.task.launch=false
mixin.ai.task.memory_change_counting=false

# Disabled: race condition with ServerCore parallel mob spawning. LegacyRandomSource
# is shared per ServerWorld; ServerCore parallelism causes ThreadingDetector crash on
# NaturalSpawner.m_47038_. Triggered after adding EchoVoids/ProMax/Incision (2026-05-01).
mixin.alloc.chunk_random=false
