
#Found a bug or have a feature request?
#Report it on GitHub: https://github.com/Flix100000/History-Stages/issues
#
#Chat messages settings
[messages]
	#Show a welcome message in chat when a player joins the world? [Default: true]
	showWelcomeMessage = true
	#Show debug messages in chat if a JSON stage has errors or missing items? [Default: true]
	showDebugErrors = true
	#Log runtime events (stage unlock/lock, blocked actions, loot replacements) to config/historystages/logs/runtime-*.log? [Default: false]
	enableRuntimeLogging = false

#Gameplay and Server-side settings
[gameplay]
	#Handle locked items in mob loot tables? [Default: true]
	lockMobLoot = false
	#Make locked blocks much harder to break and prevent their drops? [Default: true]
	lockBlockBreaking = false
	#Break speed multiplier for locked blocks. Lower = slower. 0.05 = 20x slower (like using wrong tool). [Default: 0.05]
	#Range: 0.001 ~ 1.0
	lockedBlockBreakSpeedMultiplier = 0.05
	#Prevent using locked items? (Blocks equipping armor, using weapons, eating food, etc.) [Default: true]
	lockItemUsage = false
	#Prevent interacting with or breaking armor stands and item frames that contain locked items? [Default: true]
	lockEntityItems = false
	#Prevent opening the GUI of locked blocks? (Chests, furnaces, crafting tables, etc.) [Default: true]
	lockBlockInteraction = false
	#Prevent moving individually-locked items in containers? (Blocks taking items from chests, machines, etc.) [Default: true]
	lockContainerInteraction = false
	#Prevent applying locked enchantments via anvil (locked enchanted books) and enchanting table? [Default: true]
	lockEnchanting = true

#Global Notification Settings (Server-controlled)
[notifications]
	#Show unlock/lock messages in the chat for everyone? [Default: true]
	broadcastChat = true
	#Message format for unlocks (Only for the Chat and only if 'broadcastChat' = true). Use {stage} for the name and & for colors.
	unlockMessageFormat = "&fThe world has entered the &b{stage}&f!"
	#Show messages in the actionbar for everyone? [Default: false]
	useActionbar = false
	#Play notification sounds for everyone? [Default: true]
	useSounds = true
	#Show an advancement-style toast popup when a stage is unlocked? [Default: true]
	useToasts = true
	#Default icon used in unlock toasts for stages that don't define their own icon. [Default: historystages:research_scroll]
	defaultStageIcon = "historystages:research_scroll"

#Research Pedestal Settings
[research]
	#Default research time in seconds. Used as fallback if a stage does not define its own 'research_time' in the JSON. [Default: 20]
	#Range: 1 ~ 86400
	researchTimeInSeconds = 20
	#Show dependency checklist screen when interacting with pedestal that has dependency requirements? [Default: true]
	showDependencyScreenInPedestal = true
	#Booster blocks placed directly UNDER a Research Pedestal modify the active research.
	#Format per entry: "block_id, speed_percent, cost_percent, tier, mode"
	#  speed_percent: research time reduction (0-90). 90% = max (research runs 10x).
	#  cost_percent:  item-dependency count reduction (0-90). Locked into the scroll on first deposit.
	#  tier:          minimum pedestal tier the booster works under (1-4).
	#  mode:          'min' = this tier and higher, 'exact' = only this tier.
	#Legacy 3-column rows are accepted and treated as tier=1, mode=min.
	#Unknown block ids and out-of-range values are logged and skipped/clamped.
	researchBoosters = []

#Settings for replacing locked loot with alternatives
[loot_replacements]
	#If true, locked items are replaced by specific items/tags. If false, they disappear. [Default: false]
	useReplacements = false
	#{ReplacementPriority:1} A list of Item IDs to pick from if 'useReplacements' is true. [Default: cobblestone, dirt]
	replacementItems = ["minecraft:cobblestone", "minecraft:dirt"]
	#{ReplacementPriority:2} A list of tags (e.g. 'forge:dusts') to pick a random replacement from. [Default: empty]
	replacementTags = []

#Individual Stage Settings (per-player stages)
[individual_stages]
	#Prevent players from picking up items locked by individual stages? [Default: true]
	lockItemPickup = false
	#Drop locked items from a player's inventory when their individual stage is revoked? [Default: true]
	dropOnRevoke = true
	#Make blocks locked by individual stages much harder to break and prevent their drops? [Default: true]
	lockBlockBreaking = false
	#Break speed multiplier for blocks locked by individual stages. Lower = slower. 0.05 = 20x slower. [Default: 0.05]
	#Range: 0.001 ~ 1.0
	lockedBlockBreakSpeedMultiplier = 0.05
	#Prevent using items locked by individual stages? (Blocks equipping armor, using weapons, eating food, etc.) [Default: true]
	lockItemUsage = false
	#Prevent opening the GUI of blocks locked by individual stages? (Chests, furnaces, crafting tables, etc.) [Default: true]
	lockBlockInteraction = false
	#Prevent applying enchantments locked by individual stages via anvil and enchanting table? [Default: true]
	lockEnchanting = true
	#Show individual stage unlock/lock messages in the chat for the player? [Default: true]
	broadcastChat = true
	#Message format for individual stage unlocks (chat). Use {stage} for the name, {player} for the player name, and & for colors.
	unlockMessageFormat = "&fYou have unlocked &b{stage}&f!"
	#Show individual stage messages in the actionbar? [Default: false]
	useActionbar = false
	#Play notification sounds for individual stage unlocks? [Default: true]
	useSounds = true
	#Show an advancement-style toast popup when an individual stage is unlocked? [Default: true]
	useToasts = true

#Structure Lock Settings (locks player entry into specified structures)
[structure_lock]
	#How often (in ticks) to check if a player is inside a locked structure. Higher = better performance, lower = faster reaction. [Default: 10]
	#Range: 1 ~ 200
	checkInterval = 10
	#Show the player a message when they are inside a locked structure? [Default: true]
	messageEnabled = true
	#Message format for structure lock. Use {structure} for the structure ID, {stage} for the required stage, and & for colors.
	messageFormat = "&cYou cannot enter &e{structure}&c yet!"
	#Show the structure lock message in chat as well (otherwise only actionbar)? [Default: false]
	showInChat = false
	#Damage the player while they are inside a locked structure? [Default: false]
	damageEnabled = false
	#Amount of damage dealt per damage tick. [Default: 1.0]
	#Range: 0.1 ~ 100.0
	damageAmount = 1.0
	#How often (in ticks) to deal damage while inside a locked structure. [Default: 20]
	#Range: 1 ~ 600
	damageInterval = 20
	#ADVANCED — leave this alone if you don't know what it does.
	#Extra blocks added around each piece of a locked structure (rooms, corridors, houses, ...).
	#Note: a fixed safety buffer of 2 blocks is ALWAYS added on top of this value, so
	#the effective padding around structure walls is (lockPadding + 2). Setting this to 0
	#still leaves a 2-block safety wall between you and the structure. [Default: 0]
	#Range: 0 ~ 16
	lockPadding = 0
	#ADVANCED — leave this alone if you don't know what it does.
	#How far apart (in blocks) two pieces of the same structure can be while still being
	#joined into one connected lock zone. Example for a village: with a low value, each
	#house is its own little zone and the gaps between houses are walkable; with a higher
	#value, neighbouring houses + paths fuse into one lock zone covering the whole area.
	#Higher = larger, more 'filled-in' lock zones. Lower = more precise, more gaps. [Default: 6]
	#Range: 0 ~ 32
	clusterDistance = 6
	#Cancel ALL right-click interactions (blocks, items, entities) while the player is inside a locked structure? [Default: true]
	blockRightClick = true
	#Cancel ALL left-click interactions (attacking entities, breaking blocks) while the player is inside a locked structure? [Default: true]
	blockLeftClick = true
	#Cancel projectiles (arrows, snowballs, ender pearls, etc.) the moment they would impact something inside a locked structure? [Default: true]
	blockProjectiles = true

#Override the displayed text for the six 'is locked' / 'unknown' messages.
#Leave a value empty ("") to fall back to the default messages.
#Use & for color codes (e.g. &c for red).
[lock_messages]
	#Actionbar message when entering a locked dimension. Lang key: message.historystages.dimension_unknown
	dimensionUnknown = ""
	#Actionbar message when attacking a locked mob. Lang key: message.historystages.mob_unknown
	mobUnknown = ""
	#Actionbar message when interacting with a locked item. Lang key: message.historystages.item_locked
	itemLocked = ""
	#Actionbar message when interacting with a locked block. Lang key: message.historystages.block_locked
	blockLocked = ""
	#Actionbar message when interacting with armor stands / item frames holding locked items. Lang key: message.historystages.entity_item_locked
	entityItemLocked = ""
	#Actionbar message when applying a locked enchantment. Lang key: message.historystages.enchantment_locked
	enchantmentLocked = ""

